<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Under Development</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Lottie Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        .error-container {
            text-align: center;
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        /* Bigger Lottie Animation */
        #lottieAnimation {
            width: 50vw;          /* responsive width */
            max-width: 850px;     /* large size */
            height: 450px;        /* fixed height for clarity */
            margin: 0 auto;
        }

        .error-container h1 {
            color: #000;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .error-container p {
            color: #333;
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .error-container a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ff4b2b;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .error-container a:hover {
            background-color: #ff2e00;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <!-- Lottie Animation -->
        <div id="lottieAnimation"></div>

        <h1>Under Development</h1>
        <p>Have a good day</p>
        <!-- <a href="../index.php">Go to Login</a> -->
    </div>

    <script>
        lottie.loadAnimation({
            container: document.getElementById('lottieAnimation'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'animation/waiting.json' // your Lottie file
        });
    </script>

</body>
</html>
